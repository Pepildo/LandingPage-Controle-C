name: Deploy para o GitHub Pages

on:
  push:
    branches:
      - master # 👈 Altere para "master" se a sua branch principal tiver esse nome

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps # 👈 Usando a flag para ignorar os conflitos do Tailwind/Emotion

      - name: Build do projeto
        run: npm run build

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4